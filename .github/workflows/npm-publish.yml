name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact package.json version to publish"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish video-digest
    runs-on: macos-14 # Apple Silicon (M1 arm64)
    environment: npm-production
    timeout-minutes: 25
    concurrency:
      group: npm-publish-video-digest
      cancel-in-progress: false
    env:
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Set up Node for npm Trusted Publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Assert supported architecture
        run: test "$(uname -m)" = "arm64"

      - name: Refuse non-main publishes
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "npm releases must be dispatched from main."
            exit 1
          fi

      - name: Validate release identity
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const expectedVersion = process.env.RELEASE_VERSION;
          if (!expectedVersion || !/^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/.test(expectedVersion)) {
            throw new Error("Release version input must be an exact semver version.");
          }

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          if (pkg.name !== "video-digest") {
            throw new Error(`Unexpected package name: ${pkg.name}`);
          }
          if (pkg.version !== expectedVersion) {
            throw new Error(`package.json version ${pkg.version} does not match ${expectedVersion}`);
          }
          NODE

      - name: Refuse already published versions
        run: |
          set +e
          npm view "video-digest@$RELEASE_VERSION" version --json >/tmp/video-digest-npm-view.out 2>/tmp/video-digest-npm-view.err
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Version is already published: video-digest@$RELEASE_VERSION"
            cat /tmp/video-digest-npm-view.out
            exit 1
          fi

          if ! grep -q "E404" /tmp/video-digest-npm-view.err; then
            cat /tmp/video-digest-npm-view.err
            exit "$status"
          fi

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Type-check
        run: bun run typecheck

      - name: Verify package contents
        run: bun run verify:package

      - name: Smoke-test packed CLI
        run: bun run smoke:package

      - name: Publish to npm
        run: npm publish --access public
