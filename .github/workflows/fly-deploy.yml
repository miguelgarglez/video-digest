name: Deploy web to Fly

on:
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - ".github/workflows/fly-deploy.yml"
      - "Dockerfile"
      - "bun.lock"
      - "fly.toml"
      - "package.json"
      - "python/**"
      - "src/**"
      - "tsconfig.json"
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_NO_UPDATE_CHECK: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run web tests
        run: bun test src/web/handler.test.ts src/web/startup.test.ts

      - name: Typecheck
        run: bun run typecheck

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --app personal-video-digest --config fly.toml
