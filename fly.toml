app = "personal-video-digest"
primary_region = "cdg"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "3000"
  VIDEO_DIGEST_DB_PATH = "/data/ingestions.sqlite"
  VIDEO_DIGEST_OUTPUT_DIR = "/data/outputs"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "video_digest_data"
  destination = "/data"
